name: Cloudflare Auto Speedtest

on:
  schedule:
    - cron: '0 * * * *'  # 每小时执行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Setup CloudflareST
        run: |
          # 1. 获取最新版下载链接
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d '"' -f 4)
          echo "正在下载: $DOWNLOAD_URL"
          curl -L -o CloudflareST.tar.gz "$DOWNLOAD_URL"
          
          # 2. 解压到独立文件夹
          mkdir -p temp_st
          tar -zxf CloudflareST.tar.gz -C temp_st
          
          # 3. 精准移动：只移动真正的二进制程序，重命名为 CloudflareST
          find temp_st -type f -executable -exec mv {} ./CloudflareST \;
          
          # 4. 将必备的 IP 段配置文件也移到根目录
          cp temp_st/*.txt . || true
          
          # 5. 清理并赋权
          chmod +x CloudflareST
          rm -rf temp_st
          echo "准备就绪，目录列表："
          ls -F

      - name: Run Speedtest
        run: |
          # 执行测速
          sudo ./CloudflareST -n 200 -tl 200 -sl 5 -p 10 -o "result.csv"

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add result.csv
          # 检查变动并推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新优选IP: $(date)" && git push)
