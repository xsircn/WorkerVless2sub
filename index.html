<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xsop优选节点监控</title>
    <style>
        :root { --primary: #0051ff; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 5px; }
        .meta { font-size: 0.9rem; color: #666; margin-bottom: 20px; border-bottom: 1px dashed #ddd; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f0f4ff; color: var(--primary); text-align: left; padding: 12px; font-weight: 600; border-bottom: 2px solid #e0e6ed; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-family: monospace; font-size: 0.95rem; }
        tr:hover { background: #fafafa; }
        .speed { color: #28a745; font-weight: bold; }
        .ping { color: #fd7e14; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Xsop优选节点监控</h1>
        <div class="meta">更新时间：<span id="update-time">-</span></div>
        
        <div id="loader" class="loading">正在获取最新测速数据...</div>
        
        <table id="ip-table" style="display: none;">
            <thead>
                <tr>
                    <th>IP 地址</th>
                    <th>端口</th>
                    <th>平均延迟</th>
                    <th>下载速度</th>
                </tr>
            </thead>
            <tbody id="result-body"></tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            try {
                // 读取同目录下的 result.csv
                const response = await fetch('result.csv');
                if (!response.ok) throw new Error('数据尚未生成');
                const csvData = await response.text();
                
                const rows = csvData.split('\n').filter(row => row.trim() !== "");
                const tbody = document.getElementById('result-body');
                
                // 跳过第一行表头，处理数据行
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    // 根据 CloudflareST 的输出格式对应列：
                    // IP=cols[0], Port=cols[1], Delay=cols[5], Speed=cols[6]
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${cols[0]}</td>
                        <td>${cols[1]}</td>
                        <td class="ping">${cols[5]} ms</td>
                        <td class="speed">${cols[6]} MB/s</td>
                    `;
                    tbody.appendChild(tr);
                }

                document.getElementById('update-time').innerText = new Date().toLocaleString();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('ip-table').style.display = 'table';
            } catch (err) {
                document.getElementById('loader').innerText = "暂无数据，请等待 GitHub Action 测速完成。";
            }
        }
        loadData();
    </script>
</body>
</html>
